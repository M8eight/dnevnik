server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/dnevnik-realm
          jwk-set-uri: http://localhost:9090/realms/dnevnik-realm/protocol/openid-connect/certs

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user-service/**
          filters:
            - TokenRelay=
        - id: academic-service
          uri: lb://academic-service
          predicates:
            - Path=/academic-service/**
          filters:
            - TokenRelay=

springdoc:
  swagger-ui:
    urls:
      - name: "User service"
        url: /user-service/v3/api-docs
      - name: "Academic service"
        url: /academic-service/v3/api-docs
  api-docs:
    path: /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

